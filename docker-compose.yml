services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inv360:latest
    container_name: inv360-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-inv360}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-inv360}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-inv360}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: inv360-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inv360}
      POSTGRES_USER: ${POSTGRES_USER:-inv360}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inv360}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inv360} -d ${POSTGRES_DB:-inv360}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: inv360-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
